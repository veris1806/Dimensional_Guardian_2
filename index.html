<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Devs vs Bugs - Nivel 1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <header id="hud">
      <div class="stat">Servidor: <span id="base-health">100</span>% 💻</div>
      <div class="stat">Nivel: <span id="wave-number">1</span> 🌐</div>
      <div class="stat">Café: <span id="magic-energy">5</span> ☕</div>
    </header>

    <main id="lanes-container">
      <div class="lane" id="lane-1"></div>
      <div class="lane" id="lane-2"></div>
      <div class="lane" id="lane-3"></div>
    </main>

    <footer id="selection-bar">
      <button class="guardian-btn" data-type="html">
        <span class="btn-name">HTML</span>
        <span class="cost">3 ☕</span>
      </button>

      <button class="guardian-btn" data-type="css">
        <span class="btn-name">CSS</span>
        <span class="cost">4 ☕</span>
      </button>

      <button class="guardian-btn" data-type="js">
        <span class="btn-name">JS</span>
        <span class="cost">5 ☕</span>
      </button>
    </footer>

    <div id="trivia-modal" class="oculto">
      <div class="trivia-content">
        <h2>¡Apareció un Bug Educativo!</h2>
        <p id="pregunta-texto">¿Pregunta?</p>
        <div id="respuestas-container"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
